<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA — VIP Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a0e1a;
    --navy-mid: #111827;
    --navy-light: #1a2235;
    --navy-border: #1e2d45;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: rgba(201,168,76,0.1);
    --gold-border: rgba(201,168,76,0.3);
    --white: #ffffff;
    --text-muted: rgba(255,255,255,0.4);
    --text-body: rgba(255,255,255,0.7);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* LOGIN */
  #loginScreen {
    position: fixed;
    inset: 0;
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .login-box {
    width: 100%;
    max-width: 360px;
    padding: 48px 40px;
    background: var(--navy-light);
    border: 1px solid var(--navy-border);
    text-align: center;
  }

  .login-box .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .login-box h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    margin-bottom: 32px;
  }

  .login-box input {
    width: 100%;
    background: var(--navy);
    border: 1px solid var(--navy-border);
    color: var(--white);
    padding: 12px 16px;
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    outline: none;
    text-align: center;
    letter-spacing: 4px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .login-box input:focus { border-color: var(--gold-border); }

  .login-box button {
    width: 100%;
    background: var(--gold);
    color: var(--navy);
    border: none;
    padding: 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }

  .login-box button:hover { background: var(--gold-light); }

  .login-error {
    margin-top: 12px;
    font-size: 12px;
    color: #ff6b6b;
    display: none;
  }

  /* TOPBAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    height: 60px;
    border-bottom: 1px solid var(--navy-border);
    background: var(--navy-mid);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .topbar-mark {
    width: 32px;
    height: 32px;
    border: 1px solid var(--gold-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
  }

  .topbar-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-body);
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .badge-count {
    background: var(--gold-dim);
    border: 1px solid var(--gold-border);
    padding: 3px 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--gold);
  }

  .btn-refresh {
    background: transparent;
    border: 1px solid var(--navy-border);
    color: var(--text-muted);
    padding: 6px 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-refresh:hover {
    border-color: var(--gold-border);
    color: var(--gold);
  }

  /* MAIN LAYOUT */
  .main {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: calc(100vh - 60px);
  }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--navy-border);
    overflow-y: auto;
    background: var(--navy-mid);
  }

  .sidebar-head {
    padding: 20px 20px 12px;
    border-bottom: 1px solid var(--navy-border);
  }

  .sidebar-head label {
    display: block;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .search-input {
    width: 100%;
    background: var(--navy);
    border: 1px solid var(--navy-border);
    color: var(--white);
    padding: 8px 12px;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--gold-border); }
  .search-input::placeholder { color: var(--text-muted); }

  .client-list { padding: 8px 0; }

  .client-item {
    padding: 14px 20px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    border-bottom: 1px solid transparent;
  }

  .client-item:hover {
    background: var(--navy-light);
    border-bottom-color: var(--navy-border);
  }

  .client-item.active {
    background: var(--navy-light);
    border-left-color: var(--gold);
    border-bottom-color: var(--navy-border);
  }

  .client-name {
    font-size: 14px;
    font-weight: 400;
    color: var(--white);
    margin-bottom: 3px;
  }

  .client-meta {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.5px;
  }

  .empty-sidebar {
    padding: 32px 20px;
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
  }

  /* DETAIL PANEL */
  .detail {
    overflow-y: auto;
    padding: 0;
  }

  .detail-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    text-align: center;
    padding: 40px;
  }

  .detail-empty h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    margin-bottom: 8px;
    color: var(--text-body);
  }

  .detail-empty p { font-size: 14px; }

  .detail-header {
    padding: 32px 40px 24px;
    border-bottom: 1px solid var(--navy-border);
    background: var(--navy-mid);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
  }

  .detail-header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
  }

  .detail-header h1 em {
    font-style: italic;
    color: var(--gold-light);
  }

  .detail-submitted {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  /* SECTION BLOCKS */
  .detail-content {
    padding: 32px 40px 80px;
  }

  .detail-section {
    margin-bottom: 40px;
  }

  .detail-section-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .detail-section-num {
    width: 28px;
    height: 28px;
    background: var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--navy);
    flex-shrink: 0;
  }

  .detail-section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--white);
  }

  .detail-divider {
    height: 1px;
    background: linear-gradient(90deg, var(--gold-border), transparent);
    margin-bottom: 20px;
  }

  .field-block {
    margin-bottom: 16px;
    background: var(--navy-light);
    border: 1px solid var(--navy-border);
    padding: 16px 20px;
  }

  .field-block-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    display: block;
  }

  .field-block-value {
    font-size: 14px;
    color: var(--text-body);
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .field-block-value.empty { color: var(--text-muted); font-style: italic; }

  .fields-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  @media (max-width: 800px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { height: 200px; }
    .fields-grid { grid-template-columns: 1fr; }
  }

  .numbered-block {
    background: var(--navy-light);
    border: 1px solid var(--navy-border);
    overflow: hidden;
    margin-bottom: 16px;
  }

  .numbered-block-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    padding: 12px 16px 8px;
    border-bottom: 1px solid var(--navy-border);
  }

  .num-item {
    display: flex;
    gap: 0;
    border-bottom: 1px solid rgba(30,45,69,0.5);
    padding: 10px 16px;
  }

  .num-item:last-child { border-bottom: none; }

  .num-item .n {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--gold);
    min-width: 28px;
  }

  .num-item .v {
    font-size: 13px;
    color: var(--text-body);
  }

  .num-item .v.empty { color: var(--text-muted); font-style: italic; }

  /* LOADING */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    gap: 10px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 1px solid var(--gold-border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="logo">Quicks Academy</div>
    <h2>VIP Dashboard</h2>
    <input type="password" id="passwordInput" placeholder="••••••••" onkeydown="if(event.key==='Enter') checkPassword()">
    <button onclick="checkPassword()">Access Dashboard</button>
    <div class="login-error" id="loginError">Incorrect password</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-mark">QA</div>
      <div class="topbar-title">VIP Client Blueprints</div>
    </div>
    <div class="topbar-right">
      <span class="badge-count" id="clientCount">0 Clients</span>
      <button class="btn-refresh" onclick="loadClients()">Refresh</button>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="sidebar-head">
        <label>Search Clients</label>
        <input class="search-input" id="searchInput" placeholder="Client name..." oninput="filterClients()">
      </div>
      <div class="client-list" id="clientList">
        <div class="loading"><div class="spinner"></div>Loading</div>
      </div>
    </div>

    <div class="detail" id="detailPanel">
      <div class="detail-empty">
        <h3>Select a <em>Client</em></h3>
        <p>Choose a client from the list to view their blueprint.</p>
      </div>
    </div>
  </div>

</div>

<script>
  // CONFIG — same values as the form
  const SUPABASE_URL = 'https://dhipmwnrriymtatfwzko.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRoaXBtd25ycml5bXRhdGZ3emtvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTA4NTgsImV4cCI6MjA5MTg4Njg1OH0.jgc2n1j779fX2c8SG3TkNR6w2WLCejc4hcx8E3rl8E8';
  const DASHBOARD_PASSWORD = 'YOUR_DASHBOARD_PASSWORD'; // change this

  let allClients = [];
  let activeId = null;

  // PASSWORD
  function checkPassword() {
    const pw = document.getElementById('passwordInput').value;
    if (pw === DASHBOARD_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadClients();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  // LOAD CLIENTS
  async function loadClients() {
    document.getElementById('clientList').innerHTML = '<div class="loading"><div class="spinner"></div>Loading</div>';

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/vip_blueprints?order=submitted_at.desc`, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        }
      });

      if (!res.ok) throw new Error();
      allClients = await res.json();
      renderClientList(allClients);
      document.getElementById('clientCount').textContent = `${allClients.length} Client${allClients.length !== 1 ? 's' : ''}`;

    } catch(e) {
      document.getElementById('clientList').innerHTML = '<div class="empty-sidebar">Could not load clients.<br>Check Supabase config.</div>';
    }
  }

  function renderClientList(clients) {
    if (!clients.length) {
      document.getElementById('clientList').innerHTML = '<div class="empty-sidebar">No submissions yet.</div>';
      return;
    }

    document.getElementById('clientList').innerHTML = clients.map(c => `
      <div class="client-item ${c.id === activeId ? 'active' : ''}" onclick="selectClient('${c.id}')">
        <div class="client-name">${esc(c.clientName || 'Unknown')}</div>
        <div class="client-meta">${formatDate(c.submitted_at)}</div>
      </div>
    `).join('');
  }

  function filterClients() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderClientList(allClients.filter(c => (c.clientName || '').toLowerCase().includes(q)));
  }

  function selectClient(id) {
    activeId = id;
    const client = allClients.find(c => c.id === id);
    renderClientList(allClients.filter(c => {
      const q = document.getElementById('searchInput').value.toLowerCase();
      return (c.clientName || '').toLowerCase().includes(q);
    }));
    renderDetail(client);
  }

  function renderDetail(c) {
    const panel = document.getElementById('detailPanel');

    const val = (v) => v && v.trim()
      ? `<span class="field-block-value">${esc(v)}</span>`
      : `<span class="field-block-value empty">Not filled in</span>`;

    const field = (label, key) => `
      <div class="field-block">
        <span class="field-block-label">${label}</span>
        ${val(c[key])}
      </div>`;

    const numItem = (n, key) => `
      <div class="num-item">
        <span class="n">0${n}</span>
        <span class="v ${c[key] && c[key].trim() ? '' : 'empty'}">${c[key] && c[key].trim() ? esc(c[key]) : 'Not filled in'}</span>
      </div>`;

    panel.innerHTML = `
      <div class="detail-header">
        <h1>${esc(c.clientName || 'Unknown')} <em>Blueprint</em></h1>
        <span class="detail-submitted">Submitted ${formatDate(c.submitted_at)}</span>
      </div>

      <div class="detail-content">

        <!-- 01 IDENTITY -->
        <div class="detail-section">
          <div class="detail-section-head">
            <div class="detail-section-num">01</div>
            <div class="detail-section-title">Identity Architecture</div>
          </div>
          <div class="detail-divider"></div>
          <div class="fields-grid">
            ${field('The Old Identity', 'oldIdentity')}
            ${field('The New Identity', 'newIdentity')}
          </div>
          <div class="numbered-block">
            <div class="numbered-block-label">Three Traits of the New Man</div>
            ${numItem(1,'trait1')}${numItem(2,'trait2')}${numItem(3,'trait3')}
          </div>
          ${field('Declaration — "I Am..."', 'declaration')}
        </div>

        <!-- 02 CORE WHY -->
        <div class="detail-section">
          <div class="detail-section-head">
            <div class="detail-section-num">02</div>
            <div class="detail-section-title">Core Why & Legacy</div>
          </div>
          <div class="detail-divider"></div>
          ${field('Who Am I Doing This For?', 'doingThisFor')}
          ${field('What Legacy Am I Building?', 'legacy')}
          <div class="fields-grid">
            ${field('What Happens If I Do Nothing?', 'doNothing')}
            ${field('What Becomes Possible If I Win?', 'ifIWin')}
          </div>
        </div>

        <!-- 03 VISION -->
        <div class="detail-section">
          <div class="detail-section-head">
            <div class="detail-section-num">03</div>
            <div class="detail-section-title">6-Month Vision Lock</div>
          </div>
          <div class="detail-divider"></div>
          <div class="fields-grid">
            ${field('Physique', 'visionPhysique')}
            ${field('Lifestyle & Health', 'visionLifestyle')}
          </div>
          ${field('Business & Work', 'visionBusiness')}
          <div class="fields-grid">
            ${field('Relationships & Family', 'visionRelationships')}
            ${field('Mind & Mindset', 'visionMindset')}
          </div>
        </div>

        <!-- 04 NON-NEGOTIABLES -->
        <div class="detail-section">
          <div class="detail-section-head">
            <div class="detail-section-num">04</div>
            <div class="detail-section-title">Non-Negotiable Standards</div>
          </div>
          <div class="detail-divider"></div>
          <div class="numbered-block">
            <div class="numbered-block-label">Daily Non-Negotiables</div>
            ${numItem(1,'daily1')}${numItem(2,'daily2')}${numItem(3,'daily3')}${numItem(4,'daily4')}${numItem(5,'daily5')}
          </div>
          <div class="numbered-block">
            <div class="numbered-block-label">Weekly Non-Negotiables</div>
            ${numItem(1,'weekly1')}${numItem(2,'weekly2')}${numItem(3,'weekly3')}${numItem(4,'weekly4')}
          </div>
        </div>

        <!-- 05 STRENGTHS & SHADOWS -->
        <div class="detail-section">
          <div class="detail-section-head">
            <div class="detail-section-num">05</div>
            <div class="detail-section-title">Strengths & Shadow Work</div>
          </div>
          <div class="detail-divider"></div>
          <div class="fields-grid">
            ${field('Competitive Edges & Strengths', 'strengths')}
            ${field('Vices, Patterns & Shadows', 'shadows')}
          </div>
          ${field('The Trigger — When Do My Shadows Show Up?', 'trigger')}
          ${field('The New Response — What I Do Instead', 'newResponse')}
        </div>

        <!-- 06 RECOVERY -->
        <div class="detail-section">
          <div class="detail-section-head">
            <div class="detail-section-num">06</div>
            <div class="detail-section-title">Stress Release & Recovery</div>
          </div>
          <div class="detail-divider"></div>
          ${field('Primary Release — Physical Outlet', 'physicalRelease')}
          <div class="fields-grid">
            ${field('Secondary Release — Mental / Emotional', 'mentalRelease')}
            ${field('Weekly Recovery Ritual', 'weeklyRecovery')}
          </div>
        </div>

        <!-- 07 ENVIRONMENT -->
        <div class="detail-section">
          <div class="detail-section-head">
            <div class="detail-section-num">07</div>
            <div class="detail-section-title">Environment & Accountability</div>
          </div>
          <div class="detail-divider"></div>
          <div class="fields-grid">
            ${field('People Who Fuel the Mission', 'fuelPeople')}
            ${field('People / Places That Drain It', 'drainPeople')}
          </div>
          ${field('Environment Adjustments (Next 30 Days)', 'envAdjustments')}
          ${field('How Conrad Should Push Me', 'howToPushMe')}
        </div>

        <!-- 08 CONTRACT -->
        <div class="detail-section">
          <div class="detail-section-head">
            <div class="detail-section-num">08</div>
            <div class="detail-section-title">The VIP Contract</div>
          </div>
          <div class="detail-divider"></div>
          <div class="fields-grid">
            ${field('Signed', 'signedName')}
            ${field('Date', 'signedDate')}
          </div>
        </div>

      </div>
    `;
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/\n/g,'<br>');
  }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
  }
</script>
</body>
</html>
